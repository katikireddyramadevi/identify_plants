databases:
  - name: identify-plants-db
    plan: free

services:
  - type: web
    name: identify-plants
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn identify_plants_and_its_Medicinal_properties.wsgi --timeout 200 --workers 1 --threads 4 --preload
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: identify-plants-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: PORT
        value: 10000
      - key: PYTHON_VERSION
        value: 3.11.9
